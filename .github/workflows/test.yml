---
name: Test

"on":
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Run pytest
        run: uv run pytest -q
      - name: Run ruff check
        run: uvx ruff check src/ mcp/ hooks/ tests/
